name: Daily worksheet run

on:
  schedule:
    # 06:00 UTC daily. Adjust the cron string below for your local timezone
    # (cron format: minute hour day-of-month month day-of-week, in UTC).
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Lets you trigger a run manually from the Actions tab without waiting
    # for the schedule. Useful for first-run smoke tests and re-runs.
    inputs:
      grade:
        description: "Grade override (4-8). Leave blank to use default."
        required: false
        type: string

permissions:
  contents: write  # needed to commit topic_history.json back to the repo

jobs:
  run-pipeline:
    name: Generate today's worksheets
    runs-on: ubuntu-latest
    timeout-minutes: 20  # safety cap; healthy runs are ~5-8 minutes
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # persist-credentials=true (default) lets the final commit step push.
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            shared-mime-info

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run pipeline
        env:
          # Required
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Optional (image-source fallback chain)
          FALLBACK_GEMINI_API_KEY: ${{ secrets.FALLBACK_GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          # Non-secret config — change these via the workflow file (or move to vars).
          MARKET: UK
          PAID_PRICE_GBP: "0.0"
          HISTORY_FILE_PATH: ./state/topic_history.json
          OUTPUT_DIR: ./output
        run: |
          mkdir -p state output
          set +e
          python -m pipeline.pipeline
          code=$?
          echo "pipeline exit code: $code"
          # 0 = all subjects succeeded, 1 = partial success (still a good day,
          # the email went out with whatever built), 2 = total failure. Only a
          # total failure should fail the job.
          if [ "$code" -ge 2 ]; then
            exit "$code"
          fi

      - name: Commit updated topic history
        # Run even if the pipeline exited with partial-failure (exit 1) so we
        # still record the topics that succeeded. Skip on full-failure (exit 2)
        # because nothing was produced.
        if: success() || failure()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add state/topic_history.json || true
          if git diff --cached --quiet; then
            echo "No history changes to commit."
          else
            git commit -m "chore: update topic history [skip ci]"
            git push
          fi

      - name: Upload generated ZIPs as workflow artifact (debug aid)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worksheets-${{ github.run_id }}
          path: output/
          retention-days: 14
          if-no-files-found: ignore
